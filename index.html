<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>بوت القبول الذكي | كلية الإمارات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background: radial-gradient(circle at top right, #1e293b, #020617); color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; padding: 1rem; }
        .main-card { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(25px); border: 1px solid rgba(56, 189, 248, 0.3); width: 100%; max-width: 650px; border-radius: 40px; padding: 1.8rem; box-shadow: 0 0 40px rgba(0,0,0,0.7); transition: all 0.3s ease; }
        .input-box { background: rgba(2,6,23,0.9); border: 1px solid #1e293b; color: white; width: 100%; padding: 0.8rem 1rem; border-radius: 24px; margin-top: 0.3rem; transition: 0.3s; }
        .input-box:focus { border-color: #38bdf8; outline: none; box-shadow: 0 0 12px rgba(56,189,248,0.3); }
        .btn-tech { background: linear-gradient(135deg, #38bdf8, #0284c7); color: white; font-weight: 800; width: 100%; padding: 0.9rem; border-radius: 32px; margin-top: 1rem; transition: 0.3s; cursor: pointer; border: none; }
        .btn-tech:hover { transform: translateY(-3px); filter: brightness(1.05); }
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
        .chat-container { background: rgba(0,0,0,0.5); border-radius: 28px; padding: 1rem; margin-top: 1rem; max-height: 400px; overflow-y: auto; backdrop-filter: blur(5px); }
        .chat-message { margin-bottom: 0.9rem; padding: 0.7rem 1.1rem; border-radius: 26px; max-width: 90%; word-wrap: break-word; line-height: 1.5; }
        .chat-user { background: #0284c7; color: white; margin-right: auto; text-align: right; border-bottom-right-radius: 6px; }
        .chat-bot { background: #1e293b; color: #e2e8f0; margin-left: auto; text-align: left; border: 1px solid #38bdf8; border-bottom-left-radius: 6px; }
        .chat-bot strong { color: #7dd3fc; }
        .typing-indicator { display: flex; gap: 5px; padding: 0.5rem; margin-right: auto; width: 50px; }
        .typing-indicator span { width: 8px; height: 8px; background: #38bdf8; border-radius: 50%; animation: blink 1.4s infinite; }
        @keyframes blink { 0%,60%,100%{ opacity:0.4; transform:scale(0.8);} 30%{ opacity:1; transform:scale(1.2);} }
        .chat-input { display: flex; gap: 12px; margin-top: 16px; }
        .chat-input input { flex: 1; background: #0f172a; border: 1px solid #334155; border-radius: 44px; padding: 12px 20px; color: white; font-size: 0.9rem; }
        .chat-input input:focus { outline: none; border-color: #38bdf8; }
        .chat-input button { background: #38bdf8; border-radius: 44px; padding: 12px 24px; font-weight: bold; border: none; cursor: pointer; transition: 0.2s; }
        .chat-input button:hover { background: #0284c7; transform: scale(1.02); }
        .api-status { background: #facc15; color: #1e293b; padding: 6px 12px; border-radius: 30px; font-size: 10px; margin-top: 8px; text-align: center; }
        @media (max-width: 600px) {
            .main-card { padding: 1rem; }
            .chat-message { max-width: 95%; font-size: 14px; }
            .chat-input input { font-size: 14px; padding: 10px 15px; }
            .chat-input button { padding: 10px 18px; }
        }
    </style>
</head>
<body>
<div class="main-card fade-in" id="mainApp">
    <div id="botScreen">
        <div class="text-center mb-4">
            <span class="bg-sky-500/20 text-sky-300 px-4 py-1 rounded-full text-xs font-bold inline-block">🤖 بوت القبول الذكي</span>
            <h1 class="text-2xl font-black mt-2">كلية الإمارات</h1>
            <p class="text-sm text-sky-400">اسألني عن القبول والتخصصات</p>
        </div>
        <div class="chat-container">
            <div id="botChatMessages" style="max-height: 320px; overflow-y: auto;">
                <div class="chat-message chat-bot">
                    👋 أهلاً بك في <strong>بوت القبول الذكي</strong>! 🎓<br>
                    سأساعدك لمعرفة أهليتك للتخصصات.<br><br>
                    ✏️ <strong>ما اسمك الكامل؟</strong>
                </div>
            </div>
            <div class="chat-input">
                <input type="text" id="botChatInput" placeholder="اكتب ردك هنا..." autofocus>
                <button id="sendBotChatBtn">إرسال</button>
            </div>
        </div>
        <div class="api-status" id="apiStatusBot">⚙️ جاري التحميل...</div>
        <footer class="mt-4 text-center opacity-40 text-[9px]">يعمل بذكاء اصطناعي Gemini</footer>
    </div>

    <div id="formScreen" class="hidden">
        <div class="text-center mb-4">
            <span class="bg-green-500/20 text-green-300 px-4 py-1 rounded-full text-xs font-bold inline-block">✅ طلب قبول رسمي</span>
            <h1 class="text-xl font-black mt-2">كلية الإمارات للعلوم والتكنولوجيا</h1>
        </div>
        <form id="admissionForm">
            <div class="mb-3">
                <label class="text-xs font-bold text-sky-400">الاسم الكامل</label>
                <input type="text" id="studentName" required class="input-box">
            </div>
            <div class="grid grid-cols-2 gap-3 mb-3">
                <div>
                    <label class="text-xs font-bold text-sky-400">رقم الهاتف</label>
                    <input type="tel" id="phone" required class="input-box" placeholder="05xxxxxxxx">
                </div>
                <div>
                    <label class="text-xs font-bold text-sky-400">النسبة المئوية</label>
                    <input type="number" id="grade" step="0.1" required class="input-box">
                </div>
            </div>
            <div class="mb-3">
                <label class="text-xs font-bold text-sky-400">التخصص</label>
                <select id="major" class="input-box">
                    <optgroup label="🏥 الطب والعلوم الصحية">
                        <option value="الطب والجراحة" data-fee="1,200,000" data-req="92">الطب والجراحة (92%)</option>
                        <option value="طب الأسنان" data-fee="1,150,000" data-req="90">طب الأسنان (90%)</option>
                        <option value="الصيدلة" data-fee="950,000" data-req="88">الصيدلة (88%)</option>
                        <option value="التمريض" data-fee="450,000" data-req="80">التمريض (80%)</option>
                        <option value="المختبرات الطبية" data-fee="500,000" data-req="78">المختبرات الطبية (78%)</option>
                        <option value="العلاج الطبيعي" data-fee="600,000" data-req="82">العلاج الطبيعي (82%)</option>
                        <option value="الأشعة والتصوير الطبي" data-fee="550,000" data-req="80">الأشعة والتصوير الطبي (80%)</option>
                    </optgroup>
                    <optgroup label="⚙️ الهندسة والتكنولوجيا">
                        <option value="هندسة البرمجيات" data-fee="600,000" data-req="80">هندسة البرمجيات (80%)</option>
                        <option value="الذكاء الاصطناعي" data-fee="700,000" data-req="85">الذكاء الاصطناعي (85%)</option>
                        <option value="الأمن السيبراني" data-fee="650,000" data-req="82">الأمن السيبراني (82%)</option>
                    </optgroup>
                    <optgroup label="📊 الإدارة والمالية">
                        <option value="إدارة الأعمال" data-fee="400,000" data-req="68">إدارة الأعمال (68%)</option>
                        <option value="المحاسبة" data-fee="420,000" data-req="70">المحاسبة (70%)</option>
                    </optgroup>
                </select>
            </div>
            <div class="bg-sky-500/10 p-2 rounded-xl text-center mb-3">
                <span class="text-[10px] text-sky-300">الرسوم الدراسية</span>
                <div class="text-xl font-black" id="feeDisplay">1,200,000 <span class="text-xs">SDG</span></div>
            </div>
            <button type="submit" id="submitBtn" class="btn-tech">إرسال الطلب</button>
        </form>
        <button id="backToBotBtn" class="mt-3 w-full py-2 border border-sky-500/40 rounded-xl text-sky-400 text-sm font-bold">↩️ العودة للبوت</button>
    </div>
    
    <div id="successSection" class="hidden text-center">
        <div class="w-16 h-16 mx-auto mb-2 bg-sky-500/20 rounded-full flex items-center justify-center">
            <span class="text-3xl">🎓</span>
        </div>
        <h2 class="text-xl font-bold">تم قبول طلبك بنجاح!</h2>
        <button id="resetAllBtn" class="mt-3 w-full py-2 border border-sky-500/40 rounded-xl text-sky-400 text-sm font-bold">تسجيل طالب آخر</button>
    </div>
</div>

<script>
    // ======================== إعدادات Gemini ========================
    let GEMINI_API_KEY = "";
    let isWaiting = false;
    
    function initAPI() {
        let saved = localStorage.getItem("gemini_key");
        if (saved && saved.startsWith("AIza")) {
            GEMINI_API_KEY = saved;
            document.getElementById("apiStatusBot").innerHTML = "✅ Gemini AI متصل";
            document.getElementById("apiStatusBot").style.background = "#22c55e";
            return true;
        }
        let key = prompt("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");
        if (key && key.startsWith("AIza")) {
            GEMINI_API_KEY = key;
            localStorage.setItem("gemini_key", key);
            document.getElementById("apiStatusBot").innerHTML = "✅ Gemini AI مفعل";
            document.getElementById("apiStatusBot").style.background = "#22c55e";
            return true;
        }
        document.getElementById("apiStatusBot").innerHTML = "⚠️ لم يتم تفعيل Gemini، سأعمل بشكل محدود";
        return false;
    }
    
    // ======================== نظام المحادثة المبسط ========================
    let step = 'name'; // name, grade, major
    let userData = { name: '', grade: 0, major: '', majorReq: 0 };
    
    const chatDiv = document.getElementById('botChatMessages');
    const inputField = document.getElementById('botChatInput');
    const sendBtn = document.getElementById('sendBotChatBtn');
    
    function addMessage(text, isUser = false) {
        const div = document.createElement('div');
        div.className = `chat-message ${isUser ? 'chat-user' : 'chat-bot'}`;
        div.innerHTML = text.replace(/\n/g, '<br>');
        chatDiv.appendChild(div);
        chatDiv.scrollTop = chatDiv.scrollHeight;
    }
    
    function showTyping() {
        const typing = document.createElement('div');
        typing.className = 'typing-indicator';
        typing.id = 'typingIndicator';
        typing.innerHTML = '<span></span><span></span><span></span>';
        chatDiv.appendChild(typing);
        chatDiv.scrollTop = chatDiv.scrollHeight;
    }
    
    function hideTyping() {
        const el = document.getElementById('typingIndicator');
        if (el) el.remove();
    }
    
    // التحقق من الأهلية
    function checkEligibility(grade, required) {
        if (grade >= required) return { ok: true, msg: `✅ مؤهل بنسبة ${grade}%` };
        if (grade >= required - 5) return { ok: true, msg: `⚠️ مؤهل لدورة تمهيدية (نسبتك ${grade}%)` };
        return { ok: false, msg: `❌ غير مؤهل (نسبتك ${grade}%، المطلوب ${required}%)` };
    }
    
    // المعالجة الأساسية
    async function processInput(text) {
        if (!text.trim()) return;
        
        if (step === 'name') {
            userData.name = text.trim();
            addMessage(`أهلاً ${userData.name} 🎓\nما نسبتك المئوية في الثانوية؟ (مثال: 85.5)`);
            step = 'grade';
            return;
        }
        
        if (step === 'grade') {
            let g = parseFloat(text);
            if (isNaN(g) || g < 0 || g > 100) {
                addMessage("⚠️ الرجاء إدخال نسبة بين 0 و 100");
                return;
            }
            userData.grade = g;
            // عرض قائمة التخصصات المبسطة
            const majorsList = `التخصصات المتاحة:
• الطب (92%)
• طب الأسنان (90%)
• الصيدلة (88%)
• هندسة البرمجيات (80%)
• الذكاء الاصطناعي (85%)
• الأمن السيبراني (82%)
• إدارة الأعمال (68%)
• المحاسبة (70%)
• وغيرها...`;
            addMessage(`نسبتك ${g}%\n\n${majorsList}\n\nالآن، اكتب اسم التخصص الذي ترغب فيه:`);
            step = 'major';
            return;
        }
        
        if (step === 'major') {
            // البحث عن التخصص
            const select = document.getElementById('major');
            let found = null;
            for (let i = 0; i < select.options.length; i++) {
                let opt = select.options[i];
                if (opt.value && opt.text.toLowerCase().includes(text.toLowerCase())) {
                    found = opt;
                    break;
                }
            }
            
            if (!found) {
                addMessage(`❌ لم أجد تخصص "${text}". اكتب اسم تخصص صحيح مثل: طب الأسنان، هندسة البرمجيات، إدارة الأعمال`);
                return;
            }
            
            const majorName = found.text;
            const req = parseInt(found.getAttribute('data-req'));
            const fee = found.getAttribute('data-fee');
            userData.major = majorName;
            userData.majorReq = req;
            
            const eligibility = checkEligibility(userData.grade, req);
            
            let response = `📊 **تخصص ${majorName}**\n`;
            response += `الحد الأدنى: ${req}%\n`;
            response += `الرسوم: ${fee} SDG\n`;
            response += `النتيجة: ${eligibility.msg}\n\n`;
            
            if (eligibility.ok) {
                response += `🎉 تهانينا! أنت مؤهل. اضغط الزر أدناه لتعبئة طلب القبول.`;
                addMessage(response);
                
                // إظهار زر التقديم
                const btnDiv = document.createElement('div');
                btnDiv.className = 'flex justify-center mt-3';
                btnDiv.innerHTML = `<button id="goToFormBtn" class="bg-teal-500 text-white font-bold py-2 px-6 rounded-full">📝 تعبئة طلب القبول</button>`;
                chatDiv.appendChild(btnDiv);
                
                document.getElementById('goToFormBtn').addEventListener('click', () => {
                    // تعبئة النموذج
                    document.getElementById('studentName').value = userData.name;
                    document.getElementById('grade').value = userData.grade;
                    for (let i = 0; i < select.options.length; i++) {
                        if (select.options[i].text === majorName) {
                            select.selectedIndex = i;
                            break;
                        }
                    }
                    // تحديث الرسوم
                    const newFee = select.options[select.selectedIndex].getAttribute('data-fee');
                    document.getElementById('feeDisplay').innerHTML = `${newFee} <span class="text-xs">SDG</span>`;
                    
                    document.getElementById('botScreen').classList.add('hidden');
                    document.getElementById('formScreen').classList.remove('hidden');
                });
            } else {
                response += `😔 للأسف غير مؤهل. يمكنك تجربة تخصص آخر يناسب مجموعك. اكتب اسم تخصص آخر.`;
                addMessage(response);
                // نبقى في step major ليعيد المحاولة
            }
            return;
        }
    }
    
    // معالج الرسائل
    async function handleSend() {
        if (isWaiting) {
            addMessage("⏳ انتظر قليلاً...");
            return;
        }
        const msg = inputField.value.trim();
        if (!msg) return;
        
        addMessage(msg, true);
        inputField.value = '';
        isWaiting = true;
        showTyping();
        
        try {
            await processInput(msg);
        } catch (err) {
            addMessage("حدث خطأ: " + err.message);
        } finally {
            hideTyping();
            isWaiting = false;
            inputField.focus();
        }
    }
    
    sendBtn.onclick = handleSend;
    inputField.onkeypress = (e) => { if (e.key === 'Enter') handleSend(); };
    
    // ======================== Firebase ونموذج القبول ========================
    const firebaseConfig = { 
        apiKey: "AIzaSyB7CFHY_kNUqpPhAESjZ8ZuPRhllPXA0_I", 
        authDomain: "database-b2217.firebaseapp.com", 
        databaseURL: "https://database-b2217-default-rtdb.firebaseio.com", 
        projectId: "database-b2217", 
        storageBucket: "database-b2217.appspot.com", 
        messagingSenderId: "255055825389", 
        appId: "1:255055825389:web:a38f83262e58b5519affe4" 
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    function updateFee() {
        const select = document.getElementById('major');
        const fee = select.options[select.selectedIndex].getAttribute('data-fee');
        document.getElementById('feeDisplay').innerHTML = `${fee} <span class="text-xs">SDG</span>`;
    }
    document.getElementById('major').addEventListener('change', updateFee);
    updateFee();
    
    document.getElementById('admissionForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const grade = parseFloat(document.getElementById('grade').value);
        const select = document.getElementById('major');
        const required = parseInt(select.options[select.selectedIndex].getAttribute('data-req'));
        
        if (grade < required - 5) {
            alert("❌ غير مؤهل للقبول المباشر");
            return;
        }
        
        const btn = document.getElementById('submitBtn');
        btn.innerText = "جاري الإرسال...";
        btn.disabled = true;
        
        db.ref('applications').push({
            fullName: document.getElementById('studentName').value,
            phone: document.getElementById('phone').value,
            grade: grade,
            major: select.options[select.selectedIndex].text,
            fee: document.getElementById('feeDisplay').innerText,
            timestamp: firebase.database.ServerValue.TIMESTAMP
        }).then(() => {
            document.getElementById('formScreen').classList.add('hidden');
            document.getElementById('successSection').classList.remove('hidden');
        }).catch(err => {
            alert("خطأ: " + err.message);
            btn.innerText = "إرسال الطلب";
            btn.disabled = false;
        });
    });
    
    document.getElementById('backToBotBtn').onclick = () => {
        document.getElementById('formScreen').classList.add('hidden');
        document.getElementById('botScreen').classList.remove('hidden');
        // إعادة تعيين البوت
        step = 'name';
        userData = { name: '', grade: 0, major: '', majorReq: 0 };
        chatDiv.innerHTML = `<div class="chat-message chat-bot">👋 مرحباً! ما اسمك الكامل؟</div>`;
    };
    
    document.getElementById('resetAllBtn').onclick = () => location.reload();
    
    // بدء التشغيل
    initAPI();
</script>
</body>
</html>
